openapi: 3.1.0

info:
  title: Customer Service API
  description: Customer Service CRUD API with JWT authentication and role-based access for KYC updates. Publishes events like CustomerCreated and KYC_UPDATED to Kafka topic "customers".
  version: 1.0.0

servers:
  - url: 'http://localhost:4000'
    description: Local Server

# GLOBAL SECURITY (applies by default)
security:
  - bearerAuth: []

paths:

  # =========================
  # TOKEN API (PUBLIC)
  # =========================
  /token:
    get:
      summary: Generate JWT Token
      description: Generate token using role query param (ADMIN / CUSTOMER / SERVICE)
      security: []
      parameters:
        - name: role
          in: query
          required: true
          schema:
            type: string
            example: ADMIN
      responses:
        '200':
          description: Token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string

  # =========================
  # CUSTOMER COLLECTION
  # =========================
  /customers:
    get:
      summary: Retrieve All Customers
      description: Requires valid JWT token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerList'
        '404':
          description: No customers found
        '500':
          description: Internal Error

    post:
      summary: Create New Customer(s)
      responses:
        '201':
          description: Customers created successfully
        '500':
          description: Internal Error

  # =========================
  # 👤 CUSTOMER BY ID
  # =========================
  /customers/{customer_id}:
    get:
      summary: Retrieve a specific customer data
      description: Requires JWT token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          description: Customer Not Found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Error

    put:
      summary: Update a specific customer
      description: Requires JWT token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
      responses:
        '200':
          description: Updated successfully
        '404':
          description: Customer not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Error

    delete:
      summary: Delete a specific customer
      description: Requires JWT token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Deleted successfully
        '404':
          description: Customer not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Error

  # =========================
  # KYC UPDATE (ADMIN ONLY)
  # =========================
  /customers/{customer_id}/kyc:
    patch:
      summary: Update KYC status
      description: Only ADMIN or SERVICE role can update KYC
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKYC_Status'
      responses:
        '200':
          description: KYC updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateKYC_StatusResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (role mismatch)
        '404':
          description: Customer not found
        '500':
          description: Internal Error

  # =========================
  # HEALTH CHECK (PUBLIC)
  # =========================
  /customers/health:
    get:
      summary: Health Check
      security: []
      responses:
        '200':
          description: Service is running

# =========================
# COMPONENTS
# =========================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CustomerId:
      name: customer_id
      in: path
      required: true
      description: ID of the customer
      schema:
        type: integer

  schemas:

    CustomerList:
      type: array
      items:
        $ref: '#/components/schemas/CustomerResponse'

    CustomerResponse:
      type: object
      properties:
        customer_id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: integer
        kyc_status:
          type: string
        created_at:
          type: string
          format: date-time

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: integer
        kyc_status:
          type: string

    UpdateKYC_Status:
      type: object
      required:
        - kyc_status
      properties:
        kyc_status:
          type: string
          example: VERIFIED

    UpdateKYC_StatusResponse:
      type: object
      properties:
        customer_id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: integer
        kyc_status:
          type: string