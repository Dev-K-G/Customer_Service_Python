apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: customer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017/bank_Dataset
            - name: JWT_SECRET
              value: supersecretkey

---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: banking
spec:
  selector:
    app: customer-service
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30001
  type: NodePort