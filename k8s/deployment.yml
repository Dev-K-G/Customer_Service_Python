apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: customer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: MONGODB_URI
              value: mongodb://mongo:27017/bank_Dataset
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8084/notifications