

services:

  customer-service:
    build:
      context: ../Customer_Service_Python
    container_name: customer-service
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/customers_db
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=supersecret
    depends_on:
      - mongo
      - kafka
    restart: always

  app:
    build: .
    container_name: customer-service-app
    ports:
      - "4001:4000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/bank_Dataset
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=supersecretkey
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080/notifications
    depends_on:
      - mongo
      - kafka

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - zookeeper

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring:/etc/prometheus
    ports:
      - "9090:9090"

volumes:
  mongo_data: